---

metadata:
  name: &name "keepalived.img"
  purpose: "Imagen para servidores MariaDB con alta disponibilidad mediante VIP"
  version: "1.0"
  role: "model"
  inheritance:
    - mariadb.img
  creation_date: "2026-xx-xx"
  content:
    - "Alta disponibilidad con VIPs"

hostname:
  name: *name

applications:
  - group: "alta disponibilidad"
    action: "add"
    description: >
      Keepalived para gestión de VIP failover automático.
    packages:
      - "keepalived"

services:
  enable:
    - "keepalived"

ha:
  keepalived:
    vrrp:
      instance_name: "[vrrp_instance_name]" # ej: VI_MAXSCALE
      state: "[vrrp_state]" # MASTER|BACKUP
      interface: "[vrrp_interface]" # ej: eth0
      virtual_router_id: "[virtual_router_id]" # 1-255
      priority: "[vrrp_priority]" # 1-255
      advert_int: 1

      authentication:
        auth_type: "PASS"
        auth_pass: "[vrrp_auth_pass]" # 8 chars

      virtual_ipaddress:
        - "[vip_address]/[vip_prefix]" # ej: 192.168.10.50/24

      mode:
        type: "[vrrp_mode]" # multicast|unicast
        unicast_src_ip: "[unicast_src_ip]" # requerido si vrrp_mode=unicast
        unicast_peer:
          - "[unicast_peer_ip]" # IP del otro nodo (si son 2 nodos)

    tracking:
      enabled: true
      target: "maxscale"
      
security:
  selinux:
    port_contexts:
      - port: 112
        protocol: "vrrp"
  firewall:
    rules:
      - name: "vrrp advertisements"
        protocol: "vrrp"
        direction: "input"
        port: 112
---
