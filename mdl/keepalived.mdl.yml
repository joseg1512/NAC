---

metadata:
  name: "keepalived.mdl"
  purpose: "Modelo para servicio de IP virtual flotante con Keepalived"
  version: "1.0"
  role: "model"
  inheritance:
  creation_date: "2026-01-26"
  content:
    - "Habilita alta disponibilidad con IP virtual flotante"


applications:
  - group: "alta disponibilidad"
    action: "add"
    description: >
      Keepalived para gestión de VIP failover automático.
    packages:
      - "keepalived"


networking:
  # Pendiente: definición de interfaces de red


keepalived:

  email:
    # Identificador del nodo, aparece en el Subject de los correos de notificación
    router_id: "[hostname_del_nodo]"
    smtp_server: "mail.nac.ucr.ac.cr"
    smtp_port: 587
    notification_email_from: "[email_del_servicio]"
    notification_email_to:
      - "[email_del_servicio]"


  vrrp:
    # Nombre del cluster precedido con el prefijo "vip_", por ejemplo: vip_maxscale
    instance_name: "[vrrp_instance_name]"
    type: "unicast"

    # Debe haber un servidor master y un backup, ejemplo: MASTER o BACKUP
    state: "[vrrp_state]"

    # Interfaz de red del frente donde se asignará la VIP flotante
    interface: "[vrrp_interface_front]"

    # Prioridad del host para atender el servicio; mayor número implica mayor prioridad
    priority: "[vrrp_priority]"            # 1-255

    # Intervalo en segundos entre anuncios VRRP enviados al nodo par
    advert_int: 1

    # Identificador numérico compartido entre todos los nodos del grupo HA, debe ser idéntico en todos
    virtual_router_id: "[virtual_router_id]"  # 1-255

    virtual_ipaddress: "[vip_address]/[vip_prefix]"  # ej: 192.168.10.50/24

    # IP de la interfaz del nodo actual, usada para enviar y recibir heartbeats VRRP
    unicast_src_ip: "[unicast_src_ip]"

    # IP del nodo par, hacia donde se envían los heartbeats VRRP
    unicast_peer_ip: "[unicast_peer_ip]"

    # Activa el envío de correos automáticamente en cada transición de estado VRRP
    smtp_alert: true


  authentication:
    auth_type: "PASS"
    auth_pass: "[vrrp_auth_pass]"          # 8 chars


  tracking:

    # Parámetros gestionados por keepalived
    keepalived:
      interval: 10  # segundos entre ejecuciones del script de verificación
      fall: 2       # fallos consecutivos para marcar el nodo como KO
      rise: 1       # éxitos consecutivos para restaurar la prioridad del nodo

    # Script que keepalived ejecuta para verificar la salud del servicio
    # Reemplazar con el nombre real ej: check_maxscale
    "[script_name]":
      path: "[/path/to/script]"   # directorio donde se encuentra el script
      file: "[script_file]"      # nombre del archivo


  scripts:
    # Reemplazar con el nombre real ej: notify_maxscale
    "[script_name]":
      path: "[/path/to/script]"     # directorio donde reside el script
      file: "[script_file]"        # nombre del archivo ejecutable

      # Acciones a ejecutar en cada transición de estado VRRP
      transitions:
        MASTER: "[transitions_to_master]"   # acciones al convertirse en MASTER
        BACKUP: "[transitions_to_backup]"   # acciones al convertirse en BACKUP
        FAULT:  "[transition_to_fault]"    # acciones al entrar en FAULT


security:
  selinux:
    enabled: true
  firewall:
    rules:
      - name: "vrrp advertisements"
        protocol: "vrrp"
        direction: "input"


services:
  enable:
    - "keepalived"

---